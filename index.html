<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriesBro | 英雄俱樂部</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --bg-dark: #0d0221;
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            text-shadow: 2px 2px var(--neon-pink);
            margin-bottom: 30px;
        }
        .link-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 0 5px var(--neon-blue);
        }
        .link-card:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
            transform: scale(1.05);
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <img src="https://via.placeholder.com/150" class="profile-img">
    <h1>FriesBro 英雄俱樂部</h1>

    <a href="https://www.youtube.com/@FriesBro" class="link-card" target="_blank">📺 主頻道｜英雄俱樂部 FriesBro</a>
    <a href="#" class="link-card" target="_blank">🗄️ 副頻道｜英雄檔案室</a>
    <a href="#" class="link-card" target="_blank">🌊 音樂｜蒸氣波串流頻道</a>
    <a href="https://twitter.com/" class="link-card" target="_blank">🐦 X (Twitter)｜道地英文版</a>

    <div class="footer">Powered by GitHub | No 跑路 Guarantee</div>
</body>
</html>
