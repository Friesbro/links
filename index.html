<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriesBro | 英雄俱樂部</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --bg-dark: #0d0221;
        }

        body {
            background-color: var(--bg-dark);
            /* 強化漸層感：讓左上和右下的光暈更明顯 */
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 255, 0.3) 0px, transparent 55%),
                radial-gradient(at 100% 100%, rgba(0, 242, 255, 0.3) 0px, transparent 55%);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 掃描線動畫層 */
        body::before {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 4px, 30px 30px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.5;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
            margin-bottom: 25px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--neon-pink), 2px 2px #000;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        /* 終極玻璃擬態按鈕 */
        .link-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 242, 255, 0.4);
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            display: block;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .link-card:hover {
            background: rgba(255, 0, 255, 0.25);
            border-color: var(--neon-pink);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.6);
            transform: translateY(-5px) scale(1.02);
            margin-bottom: 5px;
            text-shadow: 0 0 8px white;
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <img src="glitch_effect.jpg" class="profile-img">
    <h1>FriesBro 英雄俱樂部</h1>

    <a href="https://www.youtube.com/@FriesBroOfficial" class="link-card" target="_blank">📺 主頻道｜英雄俱樂部 FriesBro</a>
    <a href="https://forms.gle/5uyTf5oCFvVtvWyHA" class="link-card" target="_blank">🗄️ 副頻道｜英雄檔案室投稿 </a>
    <a href="#" class="link-card" target="_blank">🌊 音樂｜蒸氣波串流頻道 (敬請期待)</a>
    <a href="https://www.facebook.com/" class="link-card" target="_blank">🔍 臉書｜FACEBOOK </a>
    <a href="https://www.instagram.com/heroclub2.0/" class="link-card" target="_blank">✨ IG｜INSTAGRAM </a>
    <a href="https://x.com/FriesBroYT" class="link-card" target="_blank">🐦 X (Twitter)｜英文版</a>
    
    <div class="footer">EST. 2026 | UNSTOPPABLE </div>
</body>
</html>
